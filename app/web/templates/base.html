<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Расчет ЗП водителей" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
    <script src="{{ url_for('static', path='htmx-lite.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/salary">Расчет ЗП водителей</a>
      <nav class="nav">
        <a href="/salary">Зарплата</a>
        <a href="/settings">Настройки</a>
        <a href="/syncs">Синхронизации</a>
      </nav>
    </header>
    <main class="page">
      {% if message %}
        <div class="notice">{{ message }}</div>
      {% endif %}
      {% if error %}
        <div class="notice error">{{ error }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
