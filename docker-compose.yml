services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://driver_salary:${POSTGRES_PASSWORD:-driver_salary}@postgres:5432/driver_salary
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: driver_salary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-driver_salary}
      POSTGRES_DB: driver_salary
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driver_salary -d driver_salary"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
